<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <meta name="theme-color" content="#0f172a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="المخزون" />

  <!--
    🔐 Content Security Policy — مُصلحة للعمل على GitHub Pages (static)
    - لا يوجد server لتوليد nonce → نستخدم unsafe-inline للـ scripts الداخلية
    - Tailwind CDN مضافة صراحةً
  -->
  <meta http-equiv="Content-Security-Policy"
    content="
      default-src 'self';
      script-src  'self' https://cdn.tailwindcss.com https://cdn.jsdelivr.net https://unpkg.com 'unsafe-inline';
      style-src   'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net;
      font-src    'self' https://fonts.gstatic.com;
      connect-src 'self' https://*.supabase.co wss://*.supabase.co;
      img-src     'self' data: blob:;
      object-src  'none';
      base-uri    'self';
      form-action 'self';
    "
  />

  <!-- PWA Manifest & Icons — مسارات نسبية ✅ -->
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/svg+xml" href="./assets/icons/icon.svg" />
  <link rel="apple-touch-icon" href="./assets/icons/icon.svg" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    if (typeof tailwind !== 'undefined') { tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            arabic: ['Tajawal', 'sans-serif'],
            mono:   ['IBM Plex Mono', 'monospace'],
          },
          colors: {
            brand: {
              50:  '#eff6ff',
              100: '#dbeafe',
              400: '#60a5fa',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
            },
            surface: {
              900: '#0f172a',
              800: '#1e293b',
              700: '#334155',
              600: '#475569',
              500: '#64748b',
            },
          },
          animation: {
            'fade-in':   'fadeIn 0.2s ease-out',
            'slide-up':  'slideUp 0.25s ease-out',
            'slide-in':  'slideIn 0.3s ease-out',
            'spin-slow': 'spin 1.5s linear infinite',
          },
          keyframes: {
            fadeIn:  { from: { opacity: '0', transform: 'translateY(4px)' }, to: { opacity: '1', transform: 'translateY(0)' } },
            slideUp: { from: { opacity: '0', transform: 'translateY(20px)' }, to: { opacity: '1', transform: 'translateY(0)' } },
            slideIn: { from: { opacity: '0', transform: 'translateX(100%)' }, to: { opacity: '1', transform: 'translateX(0)' } },
          },
        },
      },
    } }
  </script>

  <!-- ملف CSS المخصص — مسار نسبي ✅ -->
  <link rel="stylesheet" href="./assets/css/main.css" />

  <title>نظام إدارة المخزون والمحاسبة</title>
</head>

<body class="bg-slate-900 font-arabic text-slate-100 antialiased">

  <noscript>
    <div style="
      position:fixed; inset:0; background:#0f172a; z-index:9999;
      display:flex; align-items:center; justify-content:center;
      font-family:Tajawal,sans-serif; direction:rtl; text-align:center; padding:2rem;
    ">
      <div style="background:#1e293b; border:1px solid #334155; border-radius:16px; padding:2rem; max-width:400px;">
        <p style="color:#f87171; font-size:1.2rem; font-weight:700; margin-bottom:0.5rem;">⚠️ JavaScript مطلوب</p>
        <p style="color:#94a3b8; font-size:0.9rem; line-height:1.6;">
          هذا التطبيق يتطلب تفعيل JavaScript في المتصفح للعمل بشكل صحيح.
        </p>
      </div>
    </div>
  </noscript>

  <!-- Loading Screen -->
  <div id="app-loader" class="fixed inset-0 bg-slate-900 z-50 flex items-center justify-center">
    <div class="text-center">
      <div class="relative w-16 h-16 mx-auto mb-4">
        <div class="absolute inset-0 border-4 border-slate-700 rounded-full"></div>
        <div class="absolute inset-0 border-4 border-t-blue-500 rounded-full animate-spin"></div>
        <div class="absolute inset-2 bg-blue-500/10 rounded-full flex items-center justify-center">
          <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
          </svg>
        </div>
      </div>
      <p class="text-slate-400 text-sm font-medium">جاري التحميل...</p>
      <p class="text-slate-600 text-xs mt-1">نظام إدارة المخزون</p>
    </div>
  </div>

  <!-- هيكل التطبيق الرئيسي -->
  <div id="app" class="hidden min-h-screen">
    <aside id="sidebar" class="
      fixed top-0 right-0 h-full w-64 z-30
      bg-slate-800/95 backdrop-blur-xl
      border-l border-slate-700/50
      flex flex-col
      shadow-2xl shadow-black/40
      transition-transform duration-300 ease-in-out
      translate-x-full lg:translate-x-0
    "></aside>

    <div id="sidebar-overlay" class="
      fixed inset-0 bg-black/60 z-20
      backdrop-blur-sm hidden lg:hidden
    "></div>

    <div class="flex flex-col min-h-screen lg:mr-64 transition-all duration-300">
      <header id="main-header" class="
        sticky top-0 z-10
        bg-slate-800/80 backdrop-blur-xl
        border-b border-slate-700/50
        px-4 py-3 flex items-center gap-3
      "></header>

      <main id="page-content" class="flex-1 overflow-auto p-4 md:p-6">
        <div class="max-w-7xl mx-auto"></div>
      </main>

      <footer class="border-t border-slate-800 py-3 px-6 text-center">
        <p class="text-slate-600 text-xs">
          نظام إدارة المخزون والمحاسبة
          &copy; <span id="footer-year"></span>
        </p>
      </footer>
    </div>
  </div>

  <div id="toast-container" class="
    fixed bottom-4 left-1/2 -translate-x-1/2
    z-[100] flex flex-col gap-2
    w-full max-w-sm px-4
    pointer-events-none
  " aria-live="polite" aria-atomic="true"></div>

  <div id="modal-container" class="fixed inset-0 z-50 hidden" role="dialog" aria-modal="true"></div>

  <!-- نقطة البدء — مسار نسبي ✅ -->
  <script type="module" src="./src/main.js"></script>

  <script>
    document.getElementById('footer-year').textContent = new Date().getFullYear();
  </script>

</body>
</html>
